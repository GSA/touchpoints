          nullable: true
          description: Name of the feedback tool in use (e.g. 'Touchpoints', 'Medallia',
            'None'). May be null.
        sitemap_url:
          type: string
          nullable: true
          description: URL of the site's XML sitemap. May be empty string or null.
        backlog_tool:
          type: string
          description: Name of the project backlog tool in use (e.g. 'Trello', 'GitHub',
            'Jira', 'None'). May be empty string.
        backlog_url:
          type: string
          description: URL to the project backlog. May be empty string.
        mobile_friendly:
          type: boolean
          nullable: true
          description: Whether the site is mobile-friendly. Null if unknown.
        has_search:
          type: boolean
          nullable: true
          description: Whether the site has a search feature. Null if unknown.
        uses_tracking_cookies:
          type: boolean
          nullable: true
          description: Whether the site uses tracking cookies. Null if unknown.
        has_authenticated_experience:
          type: boolean
          nullable: true
          description: Whether the site has an authenticated user experience. Null
            if unknown.
        authentication_tool:
          type: string
          nullable: true
          description: Authentication platform used (e.g. 'Login.gov', 'Okta', 'Max.gov',
            'None'). May be null.
        login_supported:
          type: boolean
          description: Whether user login is supported on the site.
        notes:
          type: string
          nullable: true
          description: Internal freeform notes about the website. May be empty string
            or null.
        repository_url:
          type: string
          format: uri
          nullable: true
          description: URL of the source code repository. May be empty string or null.
        hosting_platform:
          type: string
          nullable: true
          description: Infrastructure hosting platform (e.g. 'Cloud.gov', 'Federalist').
            May be empty string or null.
        website_contacts:
          type: array
          description: List of contacts associated with this website.
          items:
            "$ref": "#/components/schemas/User"
        uswds_version:
          type: string
          nullable: true
          description: Version of the U.S. Web Design System in use. May be empty
            string or null.
        https:
          type: boolean
          nullable: true
          description: Whether the site enforces HTTPS. Null if unknown.
        target_decommission_date:
          type: string
          format: date
          nullable: true
          description: ISO 8601 date on which the site is planned to be decommissioned.
            Null if not scheduled.
        created_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the record was created.
        updated_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the record was last updated.
    User:
