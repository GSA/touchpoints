---
openapi: 3.0.1
info:
  title: Touchpoints API Reference
  description: For an introduction to the Touchpoints API, see the [API Overview](https://touchpoints.digital.gov/api-overview)
    page.
  version: v1
tags:
- name: Forms
  description: |2

    Forms (also called surveys) are used to collect user feedback. With a Touchpoints account, you can
    create a form, publish it in one of several digital formats and view form responses submitted by your users. You can also share
    your form with other Touchpoints users so that it may be managed collectively by your team.

    Use the following endpoints to view your forms and form responses. Standard users can see forms for which they are a Form Manager or Response Viewer. Users with the Organization Admin role can see all forms belonging to their organization.

    Forms are identified by their short UUID, which is the 8-character string of letters and numbers used in Touchpoints form URLs. For instance, if your form lives at https://touchpoints.app.cloud.gov/admin/forms/8fc3c208, its short UUID is '8fc3c208'.

    Note that all Form endpoints are read-only. To create, edit or share a form, you must use the [Touchpoints web app](https://touchpoints.app.cloud.gov/).
- name: Services
- name: CX Collections
- name: Digital Registry
servers:
- url: https://api.gsa.gov/analytics/touchpoints/v1
  description: The production Touchpoints API
components:
  securitySchemes:
    api_key:
      type: apiKey
      name: x-api-key
      in: header
  schemas:
    CxCollectionResource:
      type: object
      description: Represents a fiscal quarter's worth of CX feedback submitted for
        a specific service. Feedback can be collected via multiple channels/surveys
        and at multiple service journey stages.
      required:
      - id
      - type
      - attributes
      properties:
        id:
          type: string
          description: Numeric identifier of the CX collection (string-encoded).
        type:
          type: string
          enum:
          - cx_collections
        attributes:
          "$ref": "#/components/schemas/CxCollectionAttributes"
    CxCollectionAttributes:
      type: object
      required:
      - user_id
      - name
      - organization_id
      - service_provider_id
      - service_id
      - service_name
      - fiscal_year
      - quarter
      - aasm_state
      - created_at
      - updated_at
      properties:
        user_id:
          type: integer
          description: ID of the user who created the collection.
        name:
          type: string
          description: Display name of the collection.
        organization_id:
          type: integer
          description: ID of the organization associated with this collection.
        service_provider_id:
          type: integer
          description: ID of the service provider associated with this collection.
        service_id:
          type: integer
          description: ID of the service being reported on.
        service_name:
          type: string
          description: Display name of the service being reported on.
        fiscal_year:
          type: string
          pattern: "^[0-9]{4}$"
          description: Federal fiscal year for this reporting period (string-encoded
            four-digit year).
        quarter:
          type: string
          enum:
          - '1'
          - '2'
          - '3'
          - '4'
          description: Federal fiscal quarter for this reporting period (string-encoded).
        aasm_state:
          type: string
          enum:
          - draft
          - submitted
          - published
          - not_reported
          - change_requested
          - archived
          description: Current workflow state of the collection record.
        rating:
          type: string
          nullable: true
          description: Overall rating for the collection. 'TRUE' denotes green, 'PARTIAL'
            is yellow, 'FALSE' means red. Null or empty string if not yet rated.
        integrity_hash:
          type: string
          nullable: true
          description: Hash used to verify data integrity of the submitted collection.
            Null if not yet computed.
        created_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the collection was created.
        submitted_at:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601 timestamp when the collection was submitted. Null
            if not yet submitted.
        updated_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the collection was last updated.
    CxCollectionDetailResource:
      type: object
      description: Represents CX feedback collected via a single channel at a single
        service journey stage for a CX Collection.
      required:
      - id
      - type
      - attributes
      properties:
        id:
          type: string
          description: Numeric identifier of the CX collection detail (string-encoded).
        type:
          type: string
          enum:
          - cx_collection_details
        attributes:
          "$ref": "#/components/schemas/CxCollectionDetailAttributes"
    CxCollectionDetailAttributes:
      type: object
      required:
      - cx_collection_id
      - service_id
      - service_name
      - service_provider_id
      - service_provider_name
      - channel
      - service_stage_id
      - service_stage_name
      - volume_of_customers_provided_survey_opportunity
      - volume_of_respondents
      - omb_control_number
      - survey_type
      - survey_title
      - trust_question_text
      - created_at
      - updated_at
      properties:
        cx_collection_id:
          type: integer
          description: Foreign key referencing the parent CX collection record.
        service_id:
          type: integer
          description: ID of the service being measured.
        service_name:
          type: string
          description: Display name of the service being measured.
        service_provider_id:
          type: integer
          description: ID of the service provider associated with this detail.
        service_provider_name:
          type: string
          description: Display name of the service provider associated with this detail.
        channel:
          type: string
          enum:
          - computer
          - mobile
          - email
          - chatbot
          - phone
          - automated_phone
          - in_person
          - paper
          - postal_mail
          - fax
          - self_service_kiosk
          - other_non_digital
          - website
          - mobile_app
          - live_chat
          - sms_text_messages
          - social_media
          - other_digital
          description: Delivery channel through which the survey was administered.
        service_stage_id:
          type: integer
          description: ID of the service journey stage at which the survey was administered.
          nullable: true
        service_stage_name:
          type: string
          description: Display name of the service journey stage (e.g. 'Beg', 'Middle',
            'End').
          nullable: true
        volume_of_customers:
          type: integer
          nullable: true
          description: Total number of customers who interacted with the service during
            the reporting period. Null if not reported.
        volume_of_customers_provided_survey_opportunity:
          type: integer
          description: Number of customers who were offered the opportunity to complete
            the survey.
        volume_of_respondents:
          type: integer
          description: Number of customers who completed the survey.
        omb_control_number:
          type: string
          description: OMB Paperwork Reduction Act control number for the survey instrument.
        survey_type:
          type: string
          enum:
          - likert_scale
          - thumbs_up_down
          description: Response format used by the survey instrument.
        survey_title:
          type: string
          description: Title of the survey instrument.
        trust_question_text:
          type: string
          description: Verbatim text of the trust question posed to respondents.
        created_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the detail record was created.
        updated_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the detail record was last updated.
    CxResponseResource:
      type: object
      description: Response to a CX collection detail survey, representing a single
        respondent's answers to the survey questions.
      required:
      - id
      - type
      - attributes
      properties:
        id:
          type: string
          description: Numeric identifier of the CX response (string-encoded).
        type:
          type: string
          enum:
          - cx_responses
        attributes:
          "$ref": "#/components/schemas/CxResponseAttributes"
    CxResponseAttributes:
      type: object
      required:
      - cx_collection_detail_id
      - cx_collection_detail_upload_id
      - question_1
      - positive_effectiveness
      - positive_ease
      - positive_efficiency
      - positive_transparency
      - positive_humanity
      - positive_employee
      - positive_other
      - negative_effectiveness
      - negative_ease
      - negative_efficiency
      - negative_transparency
      - negative_humanity
      - negative_employee
      - negative_other
      - job_id
      - created_at
      - updated_at
      - external_id
      properties:
        cx_collection_detail_id:
          type: integer
          description: Foreign key referencing the CX collection detail record.
        cx_collection_detail_upload_id:
          type: integer
          description: Foreign key referencing the batch upload that produced this
            response.
        question_1:
          type: string
          enum:
          - '0'
          - '1'
          description: Binary satisfaction response — '1' for positive, '0' for negative
            (string-encoded).
        positive_effectiveness:
          type: string
          enum:
          - '0'
          - '1'
          description: Whether the respondent cited effectiveness as a positive factor.
        positive_ease:
          type: string
          enum:
          - '0'
          - '1'
          description: Whether the respondent cited ease as a positive factor.
        positive_efficiency:
          type: string
          enum:
          - '0'
          - '1'
          description: Whether the respondent cited efficiency as a positive factor.
        positive_transparency:
          type: string
          enum:
          - '0'
          - '1'
          - 'null'
          description: Whether the respondent cited transparency as a positive factor.
        positive_humanity:
          type: string
          enum:
          - '0'
          - '1'
          - 'null'
          description: Whether the respondent cited humanity as a positive factor.
            'null' (string) indicates the dimension was not applicable for this collection.
        positive_employee:
          type: string
          enum:
          - '0'
          - '1'
          - 'null'
          description: Whether the respondent cited employee as a positive factor.
            'null' (string) indicates the dimension was not applicable for this collection.
        positive_other:
          type: string
          enum:
          - '0'
          - '1'
          - 'null'
          description: Whether the respondent cited other as a positive factor. 'null'
            (string) indicates the dimension was not applicable for this collection.
        negative_effectiveness:
          type: string
          enum:
          - '0'
          - '1'
          description: Whether the respondent cited effectiveness as a negative factor.
        negative_ease:
          type: string
          enum:
          - '0'
          - '1'
          description: Whether the respondent cited ease as a negative factor.
        negative_efficiency:
          type: string
          enum:
          - '0'
          - '1'
          description: Whether the respondent cited efficiency as a negative factor.
        negative_transparency:
          type: string
          enum:
          - '0'
          - '1'
          - 'null'
          description: Whether the respondent cited transparency as a negative factor.
        negative_humanity:
          type: string
          enum:
          - '0'
          - '1'
          - 'null'
          description: Whether the respondent cited humanity as a negative factor.
            'null' (string) indicates the dimension was not applicable for this collection.
        negative_employee:
          type: string
          enum:
          - '0'
          - '1'
          - 'null'
          description: Whether the respondent cited employee as a negative factor.
            'null' (string) indicates the dimension was not applicable for this collection.
        negative_other:
          type: string
          enum:
          - '0'
          - '1'
          - 'null'
          description: Whether the respondent cited other as a negative factor. 'null'
            (string) indicates the dimension was not applicable for this collection.
        question_4:
          type: string
          nullable: true
          description: Open-text response to question 4. Null if not answered.
        job_id:
          type: string
          description: Identifier of the batch import job that created this response.
        created_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the response was created.
        updated_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the response was last updated.
        external_id:
          type: string
          description: Identifier of this response in the originating external system.
    FormResource:
      type: object
      description: A survey form
      required:
      - id
      - type
      - attributes
      - relationships
      properties:
        id:
          type: string
          description: Numeric identifier of the form (string-encoded).
        type:
          type: string
          enum:
          - forms
        attributes:
          "$ref": "#/components/schemas/FormAttributes"
        relationships:
          "$ref": "#/components/schemas/FormRelationships"
    FormAttributes:
      type: object
      required:
      - name
      - title
      - kind
      - aasm_state
      - delivery_method
      - uuid
      - short_uuid
      - organization_id
      - user_id
      - audience
      - header_logo_display
      - success_text_heading
      - success_text
      - modal_button_text
      - early_submission
      - template
      - load_css
      - survey_form_activations
      - response_count
      - logo
      - time_zone
      - tag_list
      - created_at
      - updated_at
      properties:
        name:
          type: string
          description: Internal name of the form.
        title:
          type: string
          description: Public-facing title displayed to respondents.
        instructions:
          type: string
          nullable: true
          description: HTML instructions displayed above the form. May be empty string
            or null.
        disclaimer_text:
          type: string
          nullable: true
          description: HTML disclaimer text displayed on the form. May be empty string
            or null.
        kind:
          type: string
          enum:
          - a11_v2
          - custom
          - open_ended
          description: Form template type.
        notes:
          type: string
          nullable: true
          description: Internal notes about the form. May be empty string or null.
        status:
          type: string
          nullable: true
          description: Optional status label. Null if not set.
        created_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the form was created.
        updated_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the form was last updated.
        whitelist_url:
          type: string
          description: Primary URL allowed to embed this form. May be empty string.
        whitelist_url_1:
          type: string
          nullable: true
          description: Additional allowed embed URL slot 1. Null or empty string if
            unused.
        whitelist_url_2:
          type: string
          nullable: true
          description: Additional allowed embed URL slot 2. Null or empty string if
            unused.
        whitelist_url_3:
          type: string
          nullable: true
          description: Additional allowed embed URL slot 3. Null or empty string if
            unused.
        whitelist_url_4:
          type: string
          nullable: true
          description: Additional allowed embed URL slot 4. Null or empty string if
            unused.
        whitelist_url_5:
          type: string
          nullable: true
          description: Additional allowed embed URL slot 5. Null or empty string if
            unused.
        whitelist_url_6:
          type: string
          nullable: true
          description: Additional allowed embed URL slot 6. Null or empty string if
            unused.
        whitelist_url_7:
          type: string
          nullable: true
          description: Additional allowed embed URL slot 7. Null or empty string if
            unused.
        whitelist_url_8:
          type: string
          nullable: true
          description: Additional allowed embed URL slot 8. Null or empty string if
            unused.
        whitelist_url_9:
          type: string
          nullable: true
          description: Additional allowed embed URL slot 9. Null or empty string if
            unused.
        whitelist_test_url:
          type: string
          description: Test URL allowed to embed this form. May be empty string.
        header_logo_display:
          type: string
          enum:
          - banner
          - square
          description: Display style for the header logo.
        success_text_heading:
          type: string
          description: Heading shown on the success confirmation screen.
        success_text:
          type: string
          description: HTML body text shown on the success confirmation screen.
        modal_button_text:
          type: string
          description: Label text for the button that opens the form modal.
        early_submission:
          type: boolean
          description: Whether the form supports early/partial submission.
        template:
          type: boolean
          description: Whether this form is a reusable template.
        uuid:
          type: string
          format: uuid
          description: Full UUID identifier for the form.
        short_uuid:
          type: string
          description: First 8 characters of the UUID, used in short URLs.
        organization_id:
          type: integer
          description: ID of the organization that owns the form.
        audience:
          type: string
          enum:
          - public
          description: Intended audience for the form.
        omb_approval_number:
          type: string
          description: OMB PRA approval number. May be empty string if not yet approved.
        expiration_date:
          type: string
          format: date
          nullable: true
          description: ISO 8601 date on which the form or OMB approval expires.
        medium:
          type: string
          nullable: true
          description: Distribution medium for the form. May be empty string or null.
        federal_register_url:
          type: string
          nullable: true
          description: URL of the Federal Register notice for this form. May be empty
            string or null.
        anticipated_delivery_count:
          type: integer
          nullable: true
          description: Estimated number of responses expected. Null if not specified.
        service_name:
          type: string
          nullable: true
          description: Name of the associated service. May be empty string or null.
        data_submission_comment:
          type: string
          nullable: true
          description: Comment added at data submission time. Null if not provided.
        survey_instrument_reference:
          type: string
          nullable: true
          description: Reference to the original survey instrument. May be empty string
            or null.
        agency_poc_email:
          type: string
          nullable: true
          description: Email address of the agency point of contact. May be empty
            string or null.
        agency_poc_name:
          type: string
          nullable: true
          description: Name of the agency point of contact. May be empty string or
            null.
        department:
          type: string
          nullable: true
          description: Department associated with the form. May be empty string or
            null.
        bureau:
          type: string
          nullable: true
          description: Bureau associated with the form. May be empty string or null.
        notification_emails:
          type: string
          nullable: true
          description: Comma-separated list of email addresses to notify on submission.
            May be empty string or null.
        start_date:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601 datetime when the form becomes active. Null if always
            active.
        end_date:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601 datetime when the form closes. Null if no end date.
        aasm_state:
          type: string
          enum:
          - archived
          - created
          - published
          description: Current workflow state of the form.
        delivery_method:
          type: string
          enum:
          - inline
          - modal
          - touchpoints-hosted-only
          description: How the form is delivered to respondents.
        element_selector:
          type: string
          description: CSS selector or element ID used to attach the form. May be
            empty string.
          nullable: true
        survey_form_activations:
          type: integer
          description: Number of times the form has been activated or displayed.
        load_css:
          type: boolean
          description: Whether the form loads its own CSS stylesheet.
        logo:
          "$ref": "#/components/schemas/Logo"
        time_zone:
          type: string
          description: Time zone used for form timestamps (Rails time zone name).
        response_count:
          type: integer
          description: Total number of responses submitted to this form.
        last_response_created_at:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601 timestamp of the most recent submission. Null if no
            responses yet.
        tag_list:
          type: array
          description: List of tag labels applied to this form.
          items:
            type: string
    FormRelationships:
      type: object
      required:
      - questions
      - service
      properties:
        questions:
          type: object
          required:
          - data
          properties:
            data:
              type: array
              items:
                "$ref": "#/components/schemas/FormQuestion"
        service:
          type: object
          required:
          - data
          properties:
            data:
              type: object
              nullable: true
              description: Reference to the associated service, or null if unlinked.
              required:
              - id
              - type
              properties:
                id:
                  type: string
                  description: Numeric identifier of the Service (string-encoded).
                type:
                  type: string
                  enum:
                  - services
    FormQuestion:
      type: object
      required:
      - id
      - form_id
      - text
      - question_type
      - answer_field
      - position
      - form_section_id
      - created_at
      - updated_at
      properties:
        id:
          type: integer
          description: Numeric identifier of the question.
        form_id:
          type: integer
          description: ID of the form this question belongs to.
        text:
          type: string
          description: Question text displayed to the respondent. May contain HTML.
            May be empty string.
        question_type:
          type: string
          enum:
          - big_thumbs_up_down_buttons
          - checkbox
          - combobox
          - custom_text_display
          - date_select
          - dropdown
          - radio_buttons
          - rich_textarea
          - states_dropdown
          - text_display
          - text_email_field
          - text_field
          - text_phone_field
          - textarea
          - yes_no_buttons
          description: The UI control type used to render and capture this question's
            answer.
        answer_field:
          type: string
          pattern: "^answer_[0-9]{2}$"
          description: Slot identifier for storing this question's response (e.g.
            'answer_01').
        position:
          type: integer
          description: Display order of the question within its form section.
        is_required:
          type: boolean
          nullable: true
          description: Whether a response to this question is required for form submission.
            Null if not explicitly set.
        form_section_id:
          type: integer
          description: ID of the form section this question belongs to.
        character_limit:
          type: integer
          nullable: true
          description: Maximum number of characters allowed in the response. Null
            if no limit.
        placeholder_text:
          type: string
          nullable: true
          description: Placeholder text shown inside the input. May be empty string
            or null.
        help_text:
          type: string
          nullable: true
          description: Additional guidance shown alongside the question. May be empty
            string or null.
        created_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the question was created.
        updated_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the question was last updated.
    Logo:
      type: object
      required:
      - url
      - thumb
      - card
      - tag
      - logo_square
      properties:
        url:
          type: string
          format: uri
          nullable: true
          description: Full-size logo image URL.
        thumb:
          "$ref": "#/components/schemas/LogoVariant"
          description: Thumbnail-sized logo variant.
        card:
          "$ref": "#/components/schemas/LogoVariant"
          description: Card-sized logo variant.
        tag:
          "$ref": "#/components/schemas/LogoVariant"
          description: Tag-sized logo variant.
        logo_square:
          "$ref": "#/components/schemas/LogoVariant"
          description: Square-cropped logo variant.
    LogoVariant:
      type: object
      required:
      - url
      properties:
        url:
          type: string
          format: uri
          nullable: true
          description: URL for this logo size variant. Null if no logo has been uploaded.
    SubmissionResource:
      type: object
      description: A submitted response to a form, representing a single respondent's
        answers to the survey questions.
      required:
      - id
      - type
      - attributes
      properties:
        id:
          type: string
          description: Numeric identifier of the submission (string-encoded).
        type:
          type: string
          enum:
          - submissions
        attributes:
          "$ref": "#/components/schemas/SubmissionAttributes"
    SubmissionAttributes:
      type: object
      required:
      - page
      - flagged
      - archived
      - deleted
      - aasm_state
      - language
      - uuid
      - tags
      - created_at
      - updated_at
      - answer_01
      - answer_02
      - answer_03
      - answer_04
      - answer_05
      - answer_06
      - answer_07
      - answer_08
      - answer_09
      - answer_10
      - answer_11
      - answer_12
      - answer_13
      - answer_14
      - answer_15
      - answer_16
      - answer_17
      - answer_18
      - answer_19
      - answer_20
      - answer_21
      - answer_22
      - answer_23
      - answer_24
      - answer_25
      - answer_26
      - answer_27
      - answer_28
      - answer_29
      - answer_30
      properties:
        user_id:
          type: integer
          nullable: true
          description: ID of the authenticated user who submitted, if any. Null for
            anonymous submissions.
        created_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the submission was received.
        updated_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the submission was last updated.
        referer:
          type: string
          description: HTTP Referer header value at time of submission. May be empty
            string.
        hostname:
          type: string
          nullable: true
          description: Hostname of the page that hosted the form at submission time.
            Null for older submissions.
        page:
          type: string
          description: Path of the page that hosted the form at submission time.
        query_string:
          type: string
          nullable: true
          description: URL query string present at submission time. Null for older
            submissions.
        user_agent:
          type: string
          description: HTTP User-Agent string of the respondent's browser.
        answer_01:
          type: string
          nullable: true
          description: Response to question slot 01.
        answer_02:
