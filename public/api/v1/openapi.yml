      - updated_at
      properties:
        domain:
          type: string
          description: Fully qualified domain name of the website.
        organization_id:
          type: integer
          description: ID of the organization that owns the website.
        organization_name:
          type: string
          description: Display name of the organization that owns the website.
        parent_domain:
          type: string
          description: Parent domain under which this website resides.
        office:
          type: string
          nullable: true
          description: Office within the organization responsible for the website.
            May be empty string or null.
        sub_office:
          type: string
          nullable: true
          description: Sub-office within the office responsible for the website. May
            be empty string or null.
        contact_email:
          type: string
          format: email
          nullable: true
          description: General contact email for the website. May be empty string
            or null.
        site_owner_email:
          type: string
          format: email
          nullable: true
          description: Email address of the site owner. May be empty string or null.
        production_status:
          type: string
          enum:
          - decommissioned
          - in_development
          - production
          - redirect
          - staging
          description: Current lifecycle status of the website.
        type_of_site:
          type: string
          nullable: true
          description: Categorization of the site's primary purpose (e.g. 'Informational',
            'Application', 'API', 'Critical infrastructure'). May be null.
        digital_brand_category:
          type: string
          nullable: true
          description: Digital brand classification (e.g. 'GSA Business', 'Hybrid',
            'External'). May be empty string or null.
        redirects_to:
          type: string
          nullable: true
          description: URL or domain this site redirects to. Null or empty string
            if not a redirect.
        status_code:
          type: string
          nullable: true
          description: Last observed HTTP status code. May be null if not yet checked.
        cms_platform:
          type: string
          nullable: true
          description: CMS or hosting platform used to build the site (e.g. 'Federalist',
            'Netlify'). May be empty string or null.
        required_by_law_or_policy:
          type: string
          nullable: true
          description: Applicable law or policy mandate (e.g. 'A-11, Section 280').
            May be empty string or null.
        has_dap:
          type: boolean
          nullable: true
          description: Whether the Digital Analytics Program (DAP) is implemented
            on the site. Null if unknown.
        dap_gtm_code:
          type: string
          nullable: true
          description: DAP Google Tag Manager code. May be empty string or null.
