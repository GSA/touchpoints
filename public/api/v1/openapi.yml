  "/forms/{uuid}":
    parameters:
    - name: uuid
      in: path
      description: Short UUID of the form
      required: true
      schema:
        type: string
    get:
      summary: Show form
      description: |
        Returns details for the given form. Form must be accessible to the calling user.

        **Submissions field is deprecated:** This has traditionally been the endpoint used to retrieve a form's responses, returned as
        paginated results in the `submissions` field. However, the pagination has known issues that proved difficult to fix in a backward-compatible manner.
        As a result, we’ve introduced a new /v1/forms/{uuid}/responses endpoint, which should be used to retrieve survey responses going forward.
      tags:
      - Forms
      security:
      - api_key: []
      parameters:
      - name: page
        in: query
        required: false
        description: 'Page number, 1-based (default: 1)'
        deprecated: true
        schema:
          type: integer
      - name: size
        in: query
        required: false
        description: 'Responses per page (default: 500, max: 5000)'
        deprecated: true
        schema:
          type: integer
      - name: start_date
        in: query
        required: false
        description: 'Include responses on or after this date, YYYY-MM-DD (default:
          1 year ago)'
        deprecated: true
        schema:
          type: string
      - name: end_date
        in: query
        required: false
        description: 'Include responses on or before this date, YYYY-MM-DD (default:
          tomorrow)'
        deprecated: true
        schema:
          type: string
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                - links
                properties:
                  data:
                    "$ref": "#/components/schemas/FormResource"
                  included:
                    deprecated: true
                    type: array
                    description: Sideloaded submission records for the current page.
                    items:
                      "$ref": "#/components/schemas/SubmissionResource"
                  links:
                    deprecated: true
                    "$ref": "#/components/schemas/DeprecatedPaginationLinks"
