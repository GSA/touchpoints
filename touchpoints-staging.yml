applications:
  - name: touchpoints-staging
    memory: 2G
    disk_quota: 2G
    timeout: 180
    command: bundle exec rake cf:on_first_instance db:schema:load db:seed && bundle exec rails s -b 0.0.0.0 -p $PORT -e $RAILS_ENV
    env:
      DISABLE_DATABASE_ENVIRONMENT_CHECK: 1
      LOGIN_GOV_CLIENT_ID: urn:gov:gsa:openidconnect.profiles:sp:sso:gsa-tts-opp:touchpoints-staging
      LOGIN_GOV_IDP_BASE_URL: https://idp.int.identitysandbox.gov/
      LOGIN_GOV_REDIRECT_URI: https://touchpoints-staging.app.cloud.gov/users/auth/login_dot_gov/callback
      RAILS_ENV: staging
      TOUCHPOINTS_WEB_DOMAIN: touchpoints-staging.app.cloud.gov
      SKIP_WIDGET_RENDERER: "true"
      # Secrets managed via cf set-env (DO NOT add empty keys here):
      # - AWS_SES_ACCESS_KEY_ID
      # - AWS_SES_SECRET_ACCESS_KEY
      # - AWS_SES_REGION
      # - LOGIN_GOV_PRIVATE_KEY
      # - NEW_RELIC_KEY
      # - S3_AWS_ACCESS_KEY_ID
      # - S3_AWS_BUCKET_NAME
      # - S3_AWS_REGION
      # - S3_AWS_SECRET_ACCESS_KEY
      # - TOUCHPOINTS_EMAIL_SENDER
      # - TOUCHPOINTS_GTM_CONTAINER_ID
    buildpacks:
      - https://github.com/rileyseaburg/rust-buildpack-touchpoints.git
      - nodejs_buildpack
      - ruby_buildpack
    services:
      - touchpoints-staging-database
      - touchpoints-staging-deployer
      - touchpoints-staging-redis-service
      - touchpoints-staging-s3
      - touchpoints-staging-s3-uploads
    routes:
      - route: touchpoints-staging.app.cloud.gov
